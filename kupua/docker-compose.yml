# Kupua local development services.
#
# Elasticsearch: port 9220 (avoids clashing with Grid ES on 9200).
# imgproxy: port 3002 (full-size image proxy, TEST mode only).
#
# Usage:
#   cd kupua && docker compose up -d                       # ES only (local mode)
#   cd kupua && docker compose --profile imgproxy up -d    # ES + imgproxy
#   # or from repo root:
#   docker compose -f kupua/docker-compose.yml up -d
#
# Compatible with both Docker Compose v1 (docker-compose) and v2 (docker compose).
# v2 ignores the version key; v1 requires it.

version: "3.9"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.3
    container_name: kupua-elasticsearch
    environment:
      ES_JAVA_OPTS: "-Xms1024m -Xmx1024m"
      cluster.name: kupua
      discovery.type: single-node
      xpack.security.enabled: "false"
      network.host: 0.0.0.0
    ports:
      - "9220:9200"
    volumes:
      - kupua-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # imgproxy — server-side image resizing/format-conversion for full-size images.
  # Only started in --use-TEST mode (start.sh activates the docker compose profile).
  # Thumbnails are served directly by s3-proxy.mjs — no transformation needed.
  # See kupua/exploration/docs/imgproxy-research.md for background.
  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: kupua-imgproxy
    profiles: ["imgproxy"]
    ports:
      - "127.0.0.1:3002:8080"
    environment:
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_REGION: eu-west-1
      IMGPROXY_ALLOW_ORIGIN: "*"
      # Disable URL signing for local dev (matches eelpie fork's "no-signature" approach)
      IMGPROXY_ALLOW_INSECURE: "true"
      # Default is 16.8MP which rejects large press images (panoramas, hi-res scans).
      # 510MP covers the largest known test image. libvips streams in tiles so
      # actual RAM is far below width×height×4; one slow request won't block others.
      IMGPROXY_MAX_SRC_RESOLUTION: "550"
      # Default download timeout is 5s — the 510MP test image takes ~5.1s.
      IMGPROXY_DOWNLOAD_TIMEOUT: "15"
      # Progressive JPEG — enables interlaced encoding so images render
      # low-quality-first during download. No effect on WebP/AVIF/JXL.
      # Costs ~5-10% more encode time for JPEG but improves perceived speed.
      IMGPROXY_JPEG_PROGRESSIVE: "true"
      # Encode effort/speed: using imgproxy defaults (AVIF speed 8, JXL effort 4).
      # Benchmarked 2026-04-02 (see image-optimisation-research.md):
      # JXL effort ≥5 is catastrophically slower (+78%); AVIF speed 7 is marginal.
      # Not worth overriding — defaults are the sweet spot.
    # AWS credentials are passed via env_file (not inline environment) so that
    # `docker inspect` shows only variable names, not their values.
    # start.sh writes ~/.kupua-imgproxy.env before `docker compose up` and
    # deletes it immediately after — it exists on disk for under a second.
    # Plain string syntax (not path/required) for Docker Compose v1 compat.
    # start.sh ensures the file exists (even empty) before starting imgproxy.
    env_file:
      - ~/.kupua-imgproxy.env

volumes:
  kupua-es-data:
    driver: local

