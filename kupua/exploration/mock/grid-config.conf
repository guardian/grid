# Mock Grid config — extracted from common config (secrets removed).
# Used by kupua to derive config-driven behaviour (org name, field aliases, etc.)
# until we have a proper config store integration.

hosts.projectionPrefix=loader.media.

filters.shouldDisplayOrgOwnedCountAndFilterCheckbox=true

defaultShouldBlurGraphicImages = true

upload.limit.mb=666


# prevent non-permissioned users from downloading images
restrictDownload=true

persistence.identifier=picdarUrn

imageTypes = ["Photograph", "Illustration", "Composite"]

# The organisation name used for is:<org>-owned queries.
# Default in Grid's CommonConfig is "GNM" (see staffPhotographerOrganisation).
staffPhotographerOrganisation = "GNM"

# Whether to enable reaper feature
useReaper = false

# field aliases
field.aliases = [
  {
    elasticsearchPath = "fileMetadata.iptc.Edit Status"
    alias = "editStatus"
    label = "Edit Status"
    displaySearchHint = false
    displayInAdditionalMetadata = true
    searchHintOptions = [ "ORIGINAL", "NORMAL", "UPDATE", "CORRECTION", "DELETION" ]
  },
  {
    elasticsearchPath = "fileMetadata.icc.Profile Description"
    alias = "colourProfile"
    label = "Colour Profile"
    displaySearchHint = false
    displayInAdditionalMetadata = true
  },
  {
    elasticsearchPath = "fileMetadata.colourModel"
    alias = "colourModel"
    label = "Colour Model"
    displaySearchHint = false
    displayInAdditionalMetadata = true
    searchHintOptions = [ "RGB", "CMYK", "Greyscale", "LAB" ]
  },
  {
    elasticsearchPath = "fileMetadata.colourModelInformation.hasAlpha"
    alias = "cutout"
    label = "Cutout"
    displaySearchHint = true
    displayInAdditionalMetadata = true
    searchHintOptions = [ "false", "true" ]
  },
  {
    elasticsearchPath = "fileMetadata.colourModelInformation.bitsPerSample"
    alias = "bitsPerSample"
    label = "Bits Per Sample"
    displaySearchHint = false
    displayInAdditionalMetadata = true
    searchHintOptions = [ "8", "16", "32" ]
  },
  {
    elasticsearchPath = "fileMetadata.xmp.Iptc4xmpExt:DigitalSourceType"
    alias = "digitalSourceType"
    label = "Digital Source Type"
    displaySearchHint = false
    displayInAdditionalMetadata = true
    searchHintOptions = [ "http://cv.iptc.org/newscodes/digitalsourcetype/digitalCapture", "http://cv.iptc.org/newscodes/digitalsourcetype/computationalCapture", "http://cv.iptc.org/newscodes/digitalsourcetype/negativeFilm", "http://cv.iptc.org/newscodes/digitalsourcetype/positiveFilm", "http://cv.iptc.org/newscodes/digitalsourcetype/print", "http://cv.iptc.org/newscodes/digitalsourcetype/humanEdits", "http://cv.iptc.org/newscodes/digitalsourcetype/compositeWithTrainedAlgorithmicMedia", "http://cv.iptc.org/newscodes/digitalsourcetype/algorithmicallyEnhanced", "http://cv.iptc.org/newscodes/digitalsourcetype/digitalCreation", "http://cv.iptc.org/newscodes/digitalsourcetype/dataDrivenMedia", "http://cv.iptc.org/newscodes/digitalsourcetype/trainedAlgorithmicMedia", "http://cv.iptc.org/newscodes/digitalsourcetype/algorithmicMedia", "http://cv.iptc.org/newscodes/digitalsourcetype/screenCapture", "http://cv.iptc.org/newscodes/digitalsourcetype/composite", "http://cv.iptc.org/newscodes/digitalsourcetype/compositeCapture", "http://cv.iptc.org/newscodes/digitalsourcetype/compositeSynthetic" ]
  },
  {
    elasticsearchPath = "fileMetadata.xmp.Iptc4xmpCore:Scene"
    alias = "sceneCode"
    label = "Scene Code"
    displaySearchHint = false
    displayInAdditionalMetadata = true
  }
]

agencyPicks.colour = "#7d006880"
agencyPicks.ingredients={
