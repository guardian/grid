name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
permissions:
  contents: read
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e-tests
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      # The suite runs Chromium only (see playwright.config.ts).
      run: npx playwright install --with-deps chromium
    # The Testcontainers setup expects a pre-built `grid-all` image. Build it from
    # the repository root (the build context must be the repo root).
    - name: Build grid-all image
      working-directory: .
      run: DOCKER_BUILDKIT=1 docker build -f e2e-tests/images/Dockerfile -t grid-all .
    # GitHub sets CI=true, so global-setup starts the bundled Caddy reverse proxy on
    # :443 to route the https://*.media.<domain> domains to the grid-all container
    # (standing in for the developer's dev-nginx). No extra setup is required.
    - name: Run Playwright tests
      run: npm test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: e2e-tests/playwright-report/
        retention-days: 30
