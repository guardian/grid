name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e-tests
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    # The Testcontainers setup expects a pre-built `grid-all` image. Build it from
    # the repository root (the build context must be the repo root).
    - name: Build grid-all image
      working-directory: .
      run: DOCKER_BUILDKIT=1 docker build -f e2e-tests/images/Dockerfile -t grid-all .
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: e2e-tests/playwright-report/
        retention-days: 30
